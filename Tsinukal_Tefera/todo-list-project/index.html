<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ToDo List</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>My ToDo List</h1>
        <div class="input js-input">
            <p>WHAT NEEDS TO BE DONE?</p>
            <div class="input-area">
                <input class="js-task-input" type="text" placeholder="Add a new task...">
                <button class="btn-add js-btn-add">
                    +
                </button>
            </div>
        </div>
        <div class="description">
            <h2>Tasks Todo</h2>
            <p class="remaining"><span class="js-remaining"></span> REMAINING</p>
        </div>
        <div class="task-list">
            
        </div>
        
    </div>
    <script src="script.js"></script>
</body>
</html>
