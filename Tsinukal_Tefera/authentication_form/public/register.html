<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="bootstrap.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="styles/reg.css">
    <title>Registration Form</title>
</head>
<body>
    <div class="container">
        <div class="header">
            <h2>Create Account</h2>
            <p>Join our community today</p>
        </div>
        <form id="registerForm">
            <div class="mb-3">
                <label for="name" class="form-label fw-semibold">Full Name</label>
                <input type="text" name="name" class="form-control p-3" id="name" placeholder="Abebe Kebede" required>
            </div>
            <div class="mb-3">
                <label for="email" class="form-label fw-semibold">Email</label>
                <input type="email" name="email" class="form-control p-3" id="email" placeholder="email@example.com" required>
            </div>
            <div class="mb-3">
                <label for="password" class="form-label fw-semibold">Password</label>
                <div class="input-group">
                    <input type="password" name="password" class="form-control p-3" id="password" placeholder="Enter your password" required>
                    <button 
                        class="btn" 
                        type="button" 
                        id="togglePassword"
                        >
                        <i class="bi bi-eye"></i>
                    </button>
                </div>
            </div>
            <div class="mb-3">
                <label for="re-entry" class="form-label fw-semibold">Confirm Password</label>
                <div class="input-group">
                    <input type="password" name="re-entery" class="form-control p-3" id="re-entery" placeholder="Re-enter your password" required>
                    <button 
                        class="btn" 
                        type="button" 
                        id="togglePasswordReEntery"
                        >
                        <i class="bi bi-eye"></i>
                    </button>
                </div>
            </div>
            <p class="error" id="password-mismatch">Password doesn't match</p>
            <div class="d-grid">
                <button class="btn btn-warning" type="submit">Sign Up</button>
            </div>
        </form>
        <div class="footer">
            <p>Already have an account? <a href="login.html">Log In</a></p>
        </div>
    </div>

    <script src="script/register.js"></script>
</body>
</html>
