<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="bootstrap.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="styles/reg.css">
    <title>Login</title>
</head>
<body>
    <div class="container">
        <div class="header">
            <h2>Welcome Back</h2>
            <p>Enter your credentials to continue to your account</p>
        </div>
        <form id="loginForm">
            <div class="mb-3">
                <label for="email" class="form-label fw-semibold">Email</label>
                <input type="email" name="email" class="form-control p-3" id="email" placeholder="email@example.com" required>
            </div>
            <div class="mb-3">
                <label for="password" class="form-label fw-semibold">Password</label>
                <div class="input-group">
                    <input type="password" name="password" class="form-control p-3" id="password" placeholder="Enter your password" required>
                    <button 
                        class="btn" 
                        type="button" 
                        id="togglePassword"
                        >
                        <i class="bi bi-eye"></i>
                    </button>
                </div>
            </div>
            <div class="d-grid">
                <button class="btn btn-warning" type="submit">Login</button>
            </div>
        </form>
        <div class="footer">
            <p>Don't have an account? <a href="register.html">Sign Up</a></p>
        </div>
    </div>

    <script src="script/login.js"></script>
</body>
</html>
