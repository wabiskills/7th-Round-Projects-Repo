<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Simple Todo List</title>
  <!-- Bootstrap 5 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Font Awesome 6 -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  
  <!-- custom css file  -->
   <link rel="stylesheet" href="./css/style.css">
</head>
<body>

<div class="container" style="max-width: 700px;">
  <div class="todo-card card">
    <div class="card-header-custom">
      <h1 class="header-title">
        <i class="fas fa-tasks me-2"></i>My Todo List
      </h1>
    </div>

    <!-- Input area -->
    <div class="input-group-custom">
      <div class="input-group">
        <input type="text" id="todoInput" class="form-control todo-input" placeholder="Add New Task ...!" autocomplete="off">
        <button class="btn btn-primary add-btn ms-2" id="addBtn">
          <i class="fas fa-plus me-1"></i> Add
        </button>
      </div>
    </div>

    <!-- Task list -->
    <div class="task-list-container mt-2">
      <ul class="list-unstyled mb-0" id="todoList"></ul>
      <div id="emptyMessage" class="empty-state" style="display: none;">
      </div>
    </div>
  </div>
</div>

<!-- custom js file  -->
<script src="./js/script.js"></script>
</body>
</html>
